<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPS Nettoyage — Gestion opérations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #1a6b4a;
  --brand-dark: #0f4a32;
  --brand-light: #e8f5ef;
  --accent: #f0a500;
  --accent-light: #fff8e6;
  --danger: #e53935;
  --danger-light: #fdecea;
  --warning: #f57c00;
  --warning-light: #fff3e0;
  --success: #2e7d32;
  --success-light: #e8f5e9;
  --info: #1565c0;
  --info-light: #e3f2fd;
  --bg: #f4f6f9;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #e2e8f0;
  --text: #1a202c;
  --text-mid: #4a5568;
  --text-muted: #718096;
  --sidebar-w: 240px;
  --topbar-h: 60px;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg)}
h1,h2,h3{font-family:'Syne',sans-serif}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--brand);display:flex;flex-direction:column;transition:width .25s;overflow:hidden}
#sidebar.collapsed{width:56px;min-width:56px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0;box-shadow:var(--shadow)}
.page-area{flex:1;overflow-y:auto;padding:24px}

/* ── SIDEBAR ── */
.logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-icon{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden}
.logo-text span{display:block;font-size:.65rem;font-weight:400;opacity:.7}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.75);transition:all .15s;white-space:nowrap;overflow:hidden;margin-bottom:2px;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.nav-icon{font-size:18px;flex-shrink:0;width:22px;text-align:center}
.nav-label{font-size:.85rem;transition:opacity .2s}
#sidebar.collapsed .nav-label{opacity:0;width:0}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:.65rem;font-weight:700;border-radius:10px;padding:1px 6px;flex-shrink:0}
#sidebar.collapsed .nav-badge{display:none}
.sidebar-footer{padding:12px 8px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-footer .nav-item{font-size:.8rem}

/* ── TOPBAR ── */
.topbar-toggle{background:none;border:none;cursor:pointer;padding:8px;border-radius:6px;font-size:16px;color:var(--text-mid)}
.topbar-toggle:hover{background:var(--surface2)}
.topbar-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;flex:0 0 auto}
.search-wrap{flex:1;max-width:360px;margin:0 auto;position:relative}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-size:.85rem;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--brand);background:#fff}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.topbar-date{font-size:.8rem;color:var(--text-muted);white-space:nowrap}

/* ── PAGE ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.page-header-left h1{font-size:1.4rem;font-weight:700}
.page-subtitle{font-size:.82rem;color:var(--text-muted);margin-top:2px}
.page-header-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ── CARDS ── */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700}
.card-subtitle{font-size:.78rem;color:var(--text-muted);margin-top:2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px;margin-bottom:20px}
.kpi-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-color,var(--brand))}
.kpi-icon{font-size:1.4rem;display:block;margin-bottom:6px}
.kpi-value{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;line-height:1;color:var(--kpi-color,var(--text))}
.kpi-label{font-size:.75rem;color:var(--text-muted);margin:4px 0}
.kpi-delta{font-size:.75rem;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block}
.kpi-delta.up{background:var(--success-light);color:var(--success)}
.kpi-delta.down{background:var(--danger-light);color:var(--danger)}
.kpi-delta.neutral{background:var(--surface2);color:var(--text-muted)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid transparent;cursor:pointer;font-size:.83rem;font-weight:600;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark)}
.btn-secondary{background:#fff;border-color:var(--border);color:var(--text-mid)}
.btn-secondary:hover{border-color:var(--brand);color:var(--brand)}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-mid);padding:6px 10px}
.btn-ghost:hover{background:var(--surface2)}
.btn-sm{padding:5px 10px;font-size:.78rem}
.btn-xs{padding:3px 8px;font-size:.72rem}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:600;white-space:nowrap}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600}

/* ── ALERT ── */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:14px;font-size:.85rem}
.alert-icon{flex-shrink:0;font-size:1rem}
.alert-warning{background:var(--warning-light);border:1px solid #ffe0b2;color:#7c4700}
.alert-success{background:var(--success-light);border:1px solid #c8e6c9;color:#1b5e20}
.alert-info{background:var(--info-light);border:1px solid #bbdefb;color:#0d47a1}
.alert-danger{background:var(--danger-light);border:1px solid #ffcdd2;color:#b71c1c}

/* ── FORMS ── */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.8rem;font-weight:600;margin-bottom:5px;color:var(--text-mid)}
.form-control{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.85rem;font-family:inherit;outline:none;background:#fff;transition:border-color .15s;color:var(--text)}
.form-control:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(26,107,74,.08)}
textarea.form-control{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.required{color:var(--danger)}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:.85rem}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
.table-actions{display:flex;gap:4px}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .2s}
.modal-lg{max-width:760px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--text-muted);line-height:1;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--surface2)}
.modal-body{overflow-y:auto;padding:20px 22px;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* ── TOAST ── */
#toast-area{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius-sm);background:var(--surface);box-shadow:var(--shadow-lg);border-left:4px solid;font-size:.85rem;max-width:360px;animation:slideUp .2s}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger)}
.toast.warning{border-color:var(--warning)}
.toast.info{border-color:var(--info)}
.toast-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1rem;margin-left:auto;padding:0 2px}

/* ── PROGRESS ── */
.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s;background:var(--brand)}
.progress-fill.warn{background:var(--warning)}
.progress-fill.bad{background:var(--danger)}

/* ── EMPLOYEE CHIP / AVATAR ── */
.emp-avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:700;font-size:.7rem;flex-shrink:0}
.emp-chip{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;font-weight:500}

/* ── FILTER BAR ── */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.filter-bar .form-control{width:auto;min-width:120px;padding:6px 10px;font-size:.82rem}

/* ── PLANNING ── */
.planning-wrap{overflow-x:auto}
.plan-grid{display:grid;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);overflow:hidden}
.plan-header-row{display:grid;background:var(--surface2);border-bottom:1px solid var(--border)}
.plan-header-emp{padding:10px 14px;font-size:.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;border-right:1px solid var(--border);min-width:140px}
.plan-header-day{padding:10px 8px;font-size:.75rem;font-weight:700;color:var(--text-muted);text-align:center;border-right:1px solid var(--border)}
.plan-header-day.today{color:var(--brand);background:var(--brand-light)}
.plan-row{display:grid;border-bottom:1px solid var(--border)}
.plan-row:last-child{border-bottom:none}
.plan-emp-cell{padding:10px 14px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px;min-width:140px;background:var(--surface)}
.plan-day-cell{padding:4px;border-right:1px solid var(--border);min-height:64px;cursor:pointer;transition:background .1s;background:#fff}
.plan-day-cell:hover{background:var(--brand-light)}
.plan-day-cell.today{background:#f0faf5}
.plan-day-cell:last-child{border-right:none}
.plan-mission-block{border-radius:4px;padding:3px 6px;margin-bottom:2px;font-size:.7rem;font-weight:600;cursor:pointer;border-left:3px solid;line-height:1.3;overflow:hidden}
.plan-mission-block:hover{opacity:.85}

/* ── TABS ── */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;gap:0}
.tab-item{padding:10px 18px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab-item:hover{color:var(--brand)}
.tab-item.active{color:var(--brand);border-bottom-color:var(--brand)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
.empty-icon{font-size:3rem;margin-bottom:12px}
.empty-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text-mid);margin-bottom:6px}
.empty-sub{font-size:.85rem}

/* ── CHECKLIST ── */
.checklist-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;user-select:none}
.checklist-item:hover{background:var(--surface2)}
.checklist-item.done .ci-box{background:var(--success);border-color:var(--success)}
.checklist-item.done .ci-label{text-decoration:line-through;color:var(--text-muted)}
.ci-box{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.7rem;transition:all .15s}
.ci-label{font-size:.85rem}

/* ── QUALITY SCORE ── */
.q-score{display:inline-flex;align-items:baseline;gap:2px}
.q-score .val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--brand)}
.q-score .max{font-size:.75rem;color:var(--text-muted)}

/* ── MISC UTILS ── */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.flex-1{flex:1}.flex-wrap{flex-wrap:wrap}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.text-xs{font-size:.72rem}.text-sm{font-size:.82rem}.text-lg{font-size:1rem}
.text-muted{color:var(--text-muted)}.text-mid{color:var(--text-mid)}
.text-danger{color:var(--danger)}.text-success{color:var(--success)}.text-warning{color:var(--warning)}
.font-bold{font-weight:700}.font-600{font-weight:600}
.w-full{width:100%}
.no-print{} @media print{.no-print{display:none!important}}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  #sidebar{position:fixed;z-index:200;height:100%;transform:translateX(-100%);transition:transform .25s}
  #sidebar.open{transform:translateX(0)}
  .page-area{padding:16px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="logo">
      <div class="logo-icon">🧹</div>
      <div class="logo-text" id="logo-text">OPS Nettoyage<span id="logo-sub">Gestion opérations</span></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="nav-item" onclick="App.nav('settings')">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Paramètres</span>
      </div>
    </div>
  </nav>

  <div id="main">
    <header class="topbar">
      <button class="topbar-toggle" id="sidebar-toggle">☰</button>
      <span class="topbar-title" id="topbar-title">Tableau de bord</span>
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="search" id="search-input" placeholder="Rechercher…" autocomplete="off">
      </div>
      <span class="topbar-date" id="topbar-date"></span>
    </header>
    <main class="page-area" id="page-area"></main>
  </div>
</div>
<div id="toast-area"></div>

<script>
'use strict';

// ─── STORAGE ───────────────────────────────────────────────────────────────
const DB = {
  P: 'ops_',
  get(k) { try { const r = localStorage.getItem(this.P+k); return r ? JSON.parse(r) : null; } catch { return null; } },
  set(k, v) { try { localStorage.setItem(this.P+k, JSON.stringify(v)); return true; } catch { return false; } },
  list(k) { return this.get(k) || []; },
  find(k, id) { return this.list(k).find(i => i.id === id) || null; },
  save(k, item) {
    const l = this.list(k), i = l.findIndex(x => x.id === item.id);
    if (i >= 0) l[i] = item; else l.push(item);
    return this.set(k, l);
  },
  del(k, id) { return this.set(k, this.list(k).filter(i => i.id !== id)); },
  clear(k) { localStorage.removeItem(this.P+k); }
};

// ─── UTILS ─────────────────────────────────────────────────────────────────
const U = {
  uid: () => 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
  today: () => new Date().toISOString().slice(0,10),
  now: () => new Date().toISOString(),
  date(d, opts={}) {
    if (!d) return '—';
    return new Date(d + 'T00:00:00').toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', ...opts });
  },
  dateLong(d) {
    if (!d) return '—';
    return new Date(d + 'T00:00:00').toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  },
  time(m) {
    if (!m && m !== 0) return '—';
    const h = Math.floor(m/60), mn = m%60;
    return h > 0 ? `${h}h${mn > 0 ? String(mn).padStart(2,'0') : ''}` : `${mn}min`;
  },
  cur(n) { return new Intl.NumberFormat('fr-FR', { style:'currency', currency:'EUR' }).format(n||0); },
  t2m(t) { if (!t) return 0; const [h,m] = t.split(':').map(Number); return h*60+m; },
  m2t(m) { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; },
  addMin(t, m) { return this.m2t(this.t2m(t) + m); },
  overlap(s1, e1, s2, e2) { return this.t2m(s1) < this.t2m(e2) && this.t2m(e1) > this.t2m(s2); },
  weekDates(ref) {
    const d = new Date(ref + 'T00:00:00'), day = d.getDay();
    const mon = new Date(d);
    mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    return Array.from({length:7}, (_,i) => {
      const x = new Date(mon); x.setDate(mon.getDate()+i); return x.toISOString().slice(0,10);
    });
  },
  weekLabel(dates) { return `${this.date(dates[0])} — ${this.date(dates[6])}`; },
  esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); },
  initials(f, l) { return ((f||'')[0]||'?').toUpperCase() + ((l||'')[0]||'').toUpperCase(); },
  clamp: (v, mn, mx) => Math.min(mx, Math.max(mn, v)),
  dlJSON(data, name) { const b = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}); this._dl(b, name); },
  dlCSV(rows, name) {
    if (!rows.length) return;
    const h = Object.keys(rows[0]);
    const csv = [h.join(';'), ...rows.map(r => h.map(k => { const v = r[k]??''; return typeof v==='string'&&v.includes(';') ? `"${v}"` : v; }).join(';'))].join('\n');
    this._dl(new Blob(['\ufeff'+csv], {type:'text/csv'}), name);
  },
  _dl(b, name) { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = name; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 1000); }
};

// ─── BUSINESS LOGIC ────────────────────────────────────────────────────────
const BL = {
  estDur(surface, type) {
    const t = (Config.get('prestationTypes')||[]).find(x => x.id === type);
    const spd = t?.speedM2h || Config.get('business.defaultSpeedM2PerHour') || 150;
    if (!surface || !spd) return 60;
    return Math.ceil((surface / spd) * 60);
  },
  conflicts(empId, date, s, e, excludeId=null) {
    return DB.list('missions').filter(m =>
      m.employeeId === empId && m.date === date &&
      m.id !== excludeId && m.status !== 'annulee' &&
      U.overlap(s, e, m.startTime, m.endTime)
    );
  },
  cost(m) {
    const e = DB.find('employees', m.employeeId);
    if (!e) return 0;
    return ((m.actualDuration || m.estimatedDuration || 0) / 60) * (e.hourlyCost || Config.get('business.defaultHourlyCost') || 16.5);
  },
  revenue(m) { return DB.find('sites', m.siteId)?.pricePerIntervention || 0; },
  missions(f={}) {
    let ms = DB.list('missions');
    if (f.from) ms = ms.filter(m => m.date >= f.from);
    if (f.to) ms = ms.filter(m => m.date <= f.to);
    if (f.empId) ms = ms.filter(m => m.employeeId === f.empId);
    if (f.siteId) ms = ms.filter(m => m.siteId === f.siteId);
    if (f.status) ms = ms.filter(m => m.status === f.status);
    return ms;
  },
  kpis(from, to) {
    const ms = this.missions({from, to});
    const done = ms.filter(m => ['terminee','controlee','facturable'].includes(m.status));
    const scored = done.filter(m => m.qualityScore != null);
    const avgQ = scored.length ? scored.reduce((s,m) => s+m.qualityScore, 0) / scored.length : null;
    const rev = done.reduce((s,m) => s+this.revenue(m), 0);
    const cost = done.reduce((s,m) => s+this.cost(m), 0);
    const hrs = done.reduce((s,m) => s+(m.actualDuration||m.estimatedDuration||0)/60, 0);
    const load = {};
    ms.forEach(m => {
      if (!load[m.employeeId]) load[m.employeeId] = {count:0, hours:0};
      load[m.employeeId].count++;
      load[m.employeeId].hours += (m.estimatedDuration||0)/60;
    });
    const low = DB.list('consumables').filter(c => c.currentStock <= c.minThreshold);
    return {
      total: ms.length, done: done.length,
      cancelled: ms.filter(m => m.status==='annulee').length,
      completionRate: ms.length ? Math.round(done.length/ms.length*100) : 0,
      avgQuality: avgQ != null ? Math.round(avgQ*10)/10 : null,
      revenue: rev, cost, margin: rev ? Math.round((rev-cost)/rev*100) : 0,
      hours: Math.round(hrs), load, lowStock: low.length, lowStockItems: low
    };
  }
};

  },

    bd.id = '_modal';
    bd.innerHTML = `<div class="modal${lg?' modal-lg':''}">${html}</div>`;

    const cls = pct < (bad||warn) ? 'bad' : pct < warn ? 'warn' : '';
    return `<div class="progress-bar"><div class="progress-fill ${cls}" style="width:${U.clamp(pct,0,100)}%"></div></div>`;
  }
};

            </div>

          </div>`;
        }).join('')

  afterRender() {
    const canvas = document.getElementById('dash-chart');
    if (!canvas) return;
    const statuses = Config.get('missionStatuses') || [];
    const now = new Date(), y = now.getFullYear(), mo = String(now.getMonth()+1).padStart(2,'0');
    const ms = BL.missions({from:`${y}-${mo}-01`, to:`${y}-${mo}-31`});
    const counts = statuses.map(s => ms.filter(m => m.status===s.id).length);
    const total = counts.reduce((a,b) => a+b, 0);

    // Set canvas size
    canvas.width = canvas.parentElement.clientWidth - 40;
    canvas.height = 180;
    const ctx = canvas.getContext('2d');
    const cx = canvas.width/2, cy = 80, R = 65, r = 38;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (total === 0) {
      ctx.fillStyle = '#e2e8f0';
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.fill();
    } else {
      let angle = -Math.PI/2;
      counts.forEach((count, i) => {
        if (!count) return;
        const slice = (count/total) * Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, R, angle, angle+slice);
        ctx.closePath();
        ctx.fillStyle = statuses[i].color || '#999';
        ctx.fill();
        angle += slice;
      });
    }

    // Inner circle (donut hole)
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.fillStyle = '#1a202c';
    ctx.font = `bold 22px Syne, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(total, cx, cy+8);
    ctx.font = '11px DM Sans, sans-serif';
    ctx.fillStyle = '#718096';
    ctx.fillText('missions', cx, cy+22);

    // Legend
    const legend = document.getElementById('dash-legend');
    if (legend) {
      legend.innerHTML = statuses.map((s,i) => counts[i] ? `
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:.72rem;color:#4a5568">
          <span style="width:10px;height:10px;border-radius:2px;background:${s.color};flex-shrink:0"></span>
          ${s.label}: <strong>${counts[i]}</strong>
        </span>` : '').join('');
    }
  }
};

      <div class="text-sm text-muted">${U.esc(emp?.phone||'')}</div>
      <div class="mt-2">${H.statusBadge(m.status)}</div>
    </div>
  </div>
  <div style="background:var(--surface2);padding:10px 14px;border-radius:6px;display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap">
    <div><div class="text-xs text-muted">Date</div><div class="font-bold text-sm">${U.date(m.date)}</div></div>
    <div><div class="text-xs text-muted">Horaires</div><div class="font-bold text-sm">${m.startTime}→${m.endTime}</div></div>
    <div><div class="text-xs text-muted">Durée est.</div><div class="font-bold text-sm">${U.time(m.estimatedDuration)}</div></div>
    ${m.actualDuration?`<div><div class="text-xs text-muted">Durée réelle</div><div class="font-bold text-sm">${U.time(m.actualDuration)}</div></div>`:''}
  </div>
  ${site?.instructions?`<div class="alert alert-info"><span class="alert-icon">📌</span><div><strong>Consignes</strong><br>${U.esc(site.instructions)}</div></div>`:''}
  <div style="margin-bottom:14px">
    <div class="card-title mb-2">☑️ Checklist ${pt.icon||''} ${pt.label||''}</div>
    ${cl.length === 0 ? `<div class="text-muted text-sm">Aucune checklist définie</div>` :
      cl.map((item,i) => `<div class="checklist-item${item.done?' done':''}" onclick="Missions._toggleCheck('${id}',${i},this)">
        <div class="ci-box">${item.done?'✓':''}</div>
        <span class="ci-label">${U.esc(item.task)}</span>
      </div>`).join('')
    }
  </div>
  ${m.qualityScore!=null?`<div style="background:var(--surface2);padding:12px;border-radius:6px;margin-bottom:12px">
    <div class="flex items-center justify-between">
      <div class="card-title">📊 Qualité</div>
      <span class="q-score"><span class="val">${m.qualityScore}</span><span class="max">/10</span></span>
    </div>
    <div class="mt-1">${H.stars(m.qualityScore)}</div>
    ${m.qualityNotes?`<div class="text-sm mt-2 text-muted">${U.esc(m.qualityNotes)}</div>`:''}
  </div>`:''}
  ${m.notes?`<div class="alert alert-warning"><span class="alert-icon">📝</span>${U.esc(m.notes)}</div>`:''}
</div>
<div class="modal-footer no-print">
  <button class="btn btn-secondary btn-sm" onclick="window.print()">🖨️ Imprimer</button>
  <button class="btn btn-ghost btn-sm" onclick="H.closeModal();Missions.form('${id}')">✏️ Modifier</button>
  <button class="btn btn-primary btn-sm" onclick="H.closeModal()">Fermer</button>
</div>`, true);
  },

  _toggleCheck(mId, idx, el) {
    const m = DB.find('missions',mId);
    if (!m) return;
    if (!m.checklist?.length) {
      const tpl = (Config.get('checklistTemplates')||{})[m.type]||[];
      m.checklist = tpl.map(t=>({task:t,done:false}));
    }
    m.checklist[idx].done = !m.checklist[idx].done;
    DB.save('missions',m);
    el.classList.toggle('done');
    const box = el.querySelector('.ci-box');
    if (box) box.textContent = el.classList.contains('done') ? '✓' : '';
  },

  del(id) {
    const m = DB.find('missions',id);
    H.confirm(`Supprimer la mission du ${m?U.date(m.date):''}?`, () => {
      DB.del('missions',id); Toast.ok('Supprimée'); App.render();
    });
  },

  exportCSV() {
    const rows = this._filtered().map(m => {
      const s = DB.find('sites',m.siteId), e = DB.find('employees',m.employeeId);
      return {id:m.id,date:m.date,site:s?.name||'',agent:e?e.firstName+' '+e.lastName:'',type:m.type,debut:m.startTime,fin:m.endTime,duree:m.actualDuration||m.estimatedDuration||0,statut:m.status,qualite:m.qualityScore??'',ca:BL.revenue(m)};
    });
    U.dlCSV(rows, `missions_${U.today()}.csv`);
    Toast.ok('Export téléchargé');
  }
};

  render() {

<div class="page-header">
  <div class="page-header-left"><h1>👥 Employés</h1><div class="page-subtitle">${emps.filter(e=>e.active).length} actifs sur ${emps.length}</div></div>
  <div class="page-header-actions">
    <button class="btn btn-secondary btn-sm" onclick="Employees.exportCSV()">↓ CSV</button>

</div>
<div class="filter-bar">
  <input type="search" class="form-control" placeholder="Rechercher…" value="${U.esc(this.q)}" oninput="Employees.q=this.value;App.render()" style="max-width:260px">
</div>
<div class="grid-auto">
${emps.length === 0 ? H.empty('👤','Aucun employé','Ajoutez votre premier agent') :
  emps.map(e => {
    const ms = DB.list('missions').filter(m=>m.employeeId===e.id);
    const done = ms.filter(m=>['terminee','controlee','facturable'].includes(m.status));
    return `<div class="card" style="border-top:3px solid ${e.color||'#999'}">
      <div class="flex items-center gap-3 mb-3">
        <span class="emp-avatar" style="background:${e.color||'#999'};width:44px;height:44px;font-size:1rem">${U.initials(e.firstName,e.lastName)}</span>
        <div style="flex:1">
          <div class="font-bold">${U.esc(e.firstName)} ${U.esc(e.lastName)}</div>
          <div class="text-sm text-muted">${e.role==='chef_equipe'?"Chef d'équipe":e.role==='manager'?'Manager':'Agent'}</div>
        </div>
        <span class="badge" style="${e.active?'background:var(--success-light);color:var(--success)':'background:var(--surface2);color:var(--text-muted)'}">${e.active?'Actif':'Inactif'}</span>
      </div>
      <div class="flex gap-2 flex-wrap mb-2">${H.skillBadge(e.skillLevel)}${e.hasPermisB?'<span class="badge" style="background:#e3f2fd;color:#1565c0">🚗 Permis B</span>':''}</div>
      <div class="flex gap-1 flex-wrap mb-2">${(e.skills||[]).slice(0,3).map(s=>H.typeChip(s)).join('')}</div>
      <div class="text-sm text-muted mb-2">${e.hourlyCost?U.cur(e.hourlyCost)+'/h':''}</div>
      <div class="flex items-center justify-between">
        <span class="text-sm text-muted">${done.length} missions réalisées</span>
        <div class="table-actions">
          <button class="btn btn-ghost btn-xs" onclick="Employees.form('${e.id}')">✏️</button>
          <button class="btn btn-ghost btn-xs" onclick="Employees.del('${e.id}')">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('')
}</div>`;
  },

  form(id=null) {
    const e = id ? DB.find('employees',id)||{} : {};
    const types = Config.get('prestationTypes')||[];
    const levels = Config.get('skillLevels')||[];
    const zones = Config.get('zones')||[];
    const days = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
    H.modal(`
<div class="modal-header"><h2 class="modal-title">${id?'Modifier':'Nouvel'} employé</h2><button class="modal-close" onclick="H.closeModal()">×</button></div>
<div class="modal-body">
  <div class="form-row">
    <div class="form-group"><label>Prénom <span class="required">*</span></label><input type="text" class="form-control" id="ef_fn" value="${U.esc(e.firstName||'')}"></div>
    <div class="form-group"><label>Nom <span class="required">*</span></label><input type="text" class="form-control" id="ef_ln" value="${U.esc(e.lastName||'')}"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Email</label><input type="email" class="form-control" id="ef_email" value="${U.esc(e.email||'')}"></div>
    <div class="form-group"><label>Téléphone</label><input type="tel" class="form-control" id="ef_phone" value="${U.esc(e.phone||'')}"></div>
  </div>
  <div class="form-row-3">
    <div class="form-group"><label>Rôle</label>
      <select class="form-control" id="ef_role">
        <option value="agent" ${e.role==='agent'?'selected':''}>Agent</option>
        <option value="chef_equipe" ${e.role==='chef_equipe'?'selected':''}>Chef d'équipe</option>
        <option value="manager" ${e.role==='manager'?'selected':''}>Manager</option>
      </select></div>
    <div class="form-group"><label>Niveau</label>
      <select class="form-control" id="ef_level">${levels.map(l=>`<option value="${l.id}" ${e.skillLevel==l.id?'selected':''}>${l.label}</option>`).join('')}</select></div>
    <div class="form-group"><label>Couleur</label>
      <input type="color" class="form-control" id="ef_color" value="${e.color||'#2196F3'}" style="height:38px;padding:2px"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Coût horaire (€)</label><input type="number" class="form-control" id="ef_cost" value="${e.hourlyCost||''}" step="0.5"></div>
    <div class="form-group"><label>Heures/semaine</label><input type="number" class="form-control" id="ef_hrs" value="${e.contractHours||35}" step="0.5"></div>
  </div>
  <div class="form-group"><label>Compétences</label>
    <div style="display:flex;flex-wrap:wrap;gap:10px;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-sm)">
      ${types.map(t=>`<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:.82rem">
        <input type="checkbox" id="ef_sk_${t.id}" ${(e.skills||[]).includes(t.id)?'checked':''}>
        ${t.icon} ${t.label}</label>`).join('')}
    </div></div>
  ${zones.length?`<div class="form-group"><label>Zones</label>
    <div style="display:flex;flex-wrap:wrap;gap:10px;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-sm)">
      ${zones.map(z=>`<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:.82rem">
        <input type="checkbox" id="ef_z_${z.id}" ${(e.zones||[]).includes(z.id)?'checked':''}> ${U.esc(z.label)}</label>`).join('')}

    <label class="flex items-center gap-2" style="cursor:pointer;font-size:.875rem"><input type="checkbox" id="ef_active" ${e.active!==false?'checked':''}> Actif</label>
  </div>
  <div class="form-group mt-3"><label>Notes</label><textarea class="form-control" id="ef_notes" rows="2">${U.esc(e.notes||'')}</textarea></div>
</div>

  <button class="btn btn-secondary" onclick="H.closeModal()">Annuler</button>

</div>`, true);
  },

  save(existId) {
    const fn = document.getElementById('ef_fn')?.value?.trim();
    const ln = document.getElementById('ef_ln')?.value?.trim();
    if (!fn||!ln) { Toast.err('Prénom et nom obligatoires'); return; }
    const types = Config.get('prestationTypes')||[];
    const zones = Config.get('zones')||[];
    const days = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
    const schedule = {};
    days.forEach(d => {
      const s = document.getElementById(`ef_s_${d}`)?.value;
      const en = document.getElementById(`ef_e_${d}`)?.value;
      if (s && en) schedule[d] = {start:s, end:en};
    });
    const emp = {
      id: existId || U.uid(), firstName:fn, lastName:ln,
      email: document.getElementById('ef_email')?.value||'',
      phone: document.getElementById('ef_phone')?.value||'',
      role: document.getElementById('ef_role')?.value||'agent',
      skillLevel: parseInt(document.getElementById('ef_level')?.value)||1,
      color: document.getElementById('ef_color')?.value||'#2196F3',
      hourlyCost: parseFloat(document.getElementById('ef_cost')?.value)||0,
      contractHours: parseFloat(document.getElementById('ef_hrs')?.value)||35,
      skills: types.filter(t=>document.getElementById(`ef_sk_${t.id}`)?.checked).map(t=>t.id),
      zones: zones.filter(z=>document.getElementById(`ef_z_${z.id}`)?.checked).map(z=>z.id),
      hasPermisB: document.getElementById('ef_permis')?.checked||false,
      active: document.getElementById('ef_active')?.checked??true,
      notes: document.getElementById('ef_notes')?.value||'',
      schedule, createdAt: (existId?DB.find('employees',existId)?.createdAt:null)||U.now()
    };
    DB.save('employees',emp); H.closeModal(); Toast.ok(existId?'Modifié':'Ajouté'); App.render();
  },

  del(id) {
    const e = DB.find('employees',id);
    H.confirm(`Supprimer ${e?e.firstName+' '+e.lastName:'cet employé'} ?`, () => { DB.del('employees',id); Toast.ok('Supprimé'); App.render(); });
  },

  exportCSV() {
    const rows = DB.list('employees').map(e => ({prenom:e.firstName,nom:e.lastName,email:e.email||'',tel:e.phone||'',role:e.role,niveau:e.skillLevel,competences:(e.skills||[]).join('|'),cout_h:e.hourlyCost,actif:e.active}));
    U.dlCSV(rows, `employes_${U.today()}.csv`); Toast.ok('Export téléchargé');
  }
};

    const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : null;
    H.modal(`

  </div>
  <div class="form-row-3">
    <div class="form-group"><label>Durée est. (min)</label><input type="number" class="form-control" id="sf_dur" value="${s.estimatedDuration||''}"></div>
    <div class="form-group"><label>Prix/interv. (€)</label><input type="number" class="form-control" id="sf_price" value="${s.pricePerIntervention||''}" step="0.01"></div>
    <div class="form-group"><label>Digicode</label><input type="text" class="form-control" id="sf_digi" value="${U.esc(s.digicode||'')}"></div>
  </div>
  <div class="form-group"><label>Code accès</label><input type="text" class="form-control" id="sf_access" value="${U.esc(s.accessCode||'')}"></div>
  <div class="form-group"><label>Instructions</label><textarea class="form-control" id="sf_instr" rows="3">${U.esc(s.instructions||'')}</textarea></div>
  <div class="form-group"><label>Notes</label><textarea class="form-control" id="sf_notes" rows="2">${U.esc(s.notes||'')}</textarea></div>
  <label class="flex items-center gap-2 mt-2" style="cursor:pointer;font-size:.875rem"><input type="checkbox" id="sf_active" ${s.active!==false?'checked':''}> Site actif</label>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" onclick="H.closeModal()">Annuler</button>
  <button class="btn btn-primary" onclick="Sites.save('${id||''}')">💾 Enregistrer</button>
</div>`, true);
  },

  save(existId) {
    const name = document.getElementById('sf_name')?.value?.trim();
    if (!name) { Toast.err('Nom obligatoire'); return; }
    const site = {
      id: existId || U.uid(), name,
      clientName: document.getElementById('sf_client')?.value||'',
      address: document.getElementById('sf_addr')?.value||'',
      postalCode: document.getElementById('sf_cp')?.value||'',
      city: document.getElementById('sf_city')?.value||'',
      priority: document.getElementById('sf_prio')?.value||'normale',
      contactName: document.getElementById('sf_contact')?.value||'',
      contactPhone: document.getElementById('sf_cphone')?.value||'',
      type: document.getElementById('sf_type')?.value||'menage_courant',
      frequency: document.getElementById('sf_freq')?.value||'hebdomadaire',
      surface: parseFloat(document.getElementById('sf_surf')?.value)||0,
      estimatedDuration: parseInt(document.getElementById('sf_dur')?.value)||0,
      pricePerIntervention: parseFloat(document.getElementById('sf_price')?.value)||0,
      digicode: document.getElementById('sf_digi')?.value||'',
      accessCode: document.getElementById('sf_access')?.value||'',
      instructions: document.getElementById('sf_instr')?.value||'',
      notes: document.getElementById('sf_notes')?.value||'',
      active: document.getElementById('sf_active')?.checked??true
    };
    DB.save('sites',site); H.closeModal(); Toast.ok(existId?'Site modifié':'Site ajouté'); App.render();
  },

  del(id) {
    const s = DB.find('sites',id);
    H.confirm(`Supprimer "${s?.name||''}" ?`, () => { DB.del('sites',id); Toast.ok('Supprimé'); App.render(); });
  },

  exportCSV() {
    const rows = DB.list('sites').map(s=>({nom:s.name,client:s.clientName||'',ville:s.city||'',type:s.type,frequence:s.frequency||'',surface:s.surface||0,prix:s.pricePerIntervention||0,priorite:s.priority}));
    U.dlCSV(rows,`sites_${U.today()}.csv`); Toast.ok('Export téléchargé');
  }
};

// ─── STOCK ─────────────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
const Stock = {
  render() {
    const cons = DB.list('consumables');
    const low = cons.filter(c => c.currentStock <= c.minThreshold);
    return `
<div class="page-header">
  <div class="page-header-left"><h1>📦 Stocks & Consommables</h1><div class="page-subtitle">${cons.length} références · ${low.length} en alerte</div></div>
  <div class="page-header-actions">
    <button class="btn btn-secondary btn-sm" onclick="Stock.reappro()">📋 Liste réapprovisionnement</button>
    <button class="btn btn-primary btn-sm" onclick="Stock.form()">+ Ajouter</button>
  </div>
</div>
${low.length > 0 ? `<div class="alert alert-warning"><span class="alert-icon">⚠️</span><div><strong>${low.length} article(s) en stock critique</strong><br>${low.map(c=>`${c.name} (${c.currentStock} ${c.unit})`).join(' · ')}</div></div>` : ''}
<div class="table-wrap">
  <table>
    <thead><tr><th>Produit</th><th>Catégorie</th><th>Stock actuel</th><th>Seuil min</th><th>Niveau</th><th>Prix/unité</th><th>Fournisseur</th><th>Actions</th></tr></thead>
    <tbody>
    ${cons.length === 0 ? `<tr><td colspan="8">${H.empty('📦','Aucun consommable')}</td></tr>` :
      cons.map(c => {
        const pct = U.clamp(Math.round(c.currentStock/(c.minThreshold*2||1)*100),0,100);
        const ok = c.currentStock >= c.minThreshold;
        const cls = c.currentStock < c.minThreshold ? 'bad' : c.currentStock < c.minThreshold*1.5 ? 'warn' : '';
        return `<tr>
          <td><div class="font-bold text-sm">${U.esc(c.name)}</div><div class="text-xs text-muted">${U.esc(c.supplierRef||'')}</div></td>
          <td><span class="badge" style="background:var(--surface2)">${c.category||'—'}</span></td>
          <td><strong class="${ok?'':'text-danger'}">${c.currentStock}</strong> <span class="text-muted text-xs">${U.esc(c.unit)}</span></td>
          <td class="text-sm text-muted">${c.minThreshold} ${U.esc(c.unit)}</td>
          <td style="min-width:100px">${H.pct(pct,75,50)}</td>
          <td class="text-sm">${c.pricePerUnit?U.cur(c.pricePerUnit):'—'}</td>
          <td class="text-sm">${U.esc(c.supplier||'—')}</td>
          <td><div class="table-actions">
            <button class="btn btn-ghost btn-xs" onclick="Stock.adjust('${c.id}')" title="Ajuster stock">📦</button>
            <button class="btn btn-ghost btn-xs" onclick="Stock.form('${c.id}')">✏️</button>
            <button class="btn btn-ghost btn-xs" onclick="Stock.del('${c.id}')">🗑️</button>
          </div></td>
        </tr>`;
      }).join('')
    }
    </tbody>
  </table>
</div>`;
  },

  adjust(id) {
    const c = DB.find('consumables',id);
    if (!c) return;
    H.modal(`
<div class="modal-header"><h2 class="modal-title">Ajuster stock — ${U.esc(c.name)}</h2><button class="modal-close" onclick="H.closeModal()">×</button></div>
<div class="modal-body">
  <div class="alert alert-info"><span class="alert-icon">ℹ️</span>Stock actuel: <strong>${c.currentStock} ${c.unit}</strong> · Seuil min: ${c.minThreshold} ${c.unit}</div>
  <div class="form-group mt-3"><label>Nouveau stock (${c.unit})</label>
    <input type="number" class="form-control" id="adj_v" value="${c.currentStock}" min="0" step="0.1"></div>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" onclick="H.closeModal()">Annuler</button>
  <button class="btn btn-primary" onclick="Stock.saveAdj('${id}')">Mettre à jour</button>
</div>`);
  },
  saveAdj(id) {
    const c = DB.find('consumables',id);
    const v = parseFloat(document.getElementById('adj_v')?.value);
    if (isNaN(v)||v<0) { Toast.err('Valeur invalide'); return; }
    c.currentStock = v; DB.save('consumables',c); H.closeModal(); Toast.ok('Stock mis à jour'); App.render();
  },

  reappro() {
    const low = DB.list('consumables').filter(c=>c.currentStock<=c.minThreshold*1.5);
    H.modal(`
<div class="modal-header"><h2 class="modal-title">📋 Liste de réapprovisionnement</h2><button class="modal-close" onclick="H.closeModal()">×</button></div>
<div class="modal-body">
  ${low.length===0 ? `<div class="alert alert-success"><span class="alert-icon">✅</span>Aucun article à réapprovisionner</div>` : `
  <table style="width:100%;font-size:.85rem"><thead><tr><th>Produit</th><th>À commander</th><th>Fournisseur</th><th>Réf.</th><th>Coût est.</th></tr></thead><tbody>
  ${low.map(c=>{const need=Math.max(0,(c.minThreshold*2)-c.currentStock);return`<tr><td class="font-bold">${U.esc(c.name)}</td><td>${need} ${c.unit}</td><td>${U.esc(c.supplier||'—')}</td><td>${U.esc(c.supplierRef||'—')}</td><td>${c.pricePerUnit?U.cur(need*c.pricePerUnit):'—'}</td></tr>`;}).join('')}
  </tbody><tfoot><tr><td colspan="4" class="font-bold" style="padding-top:10px">Total estimé</td><td class="font-bold" style="padding-top:10px">${U.cur(low.reduce((s,c)=>s+Math.max(0,(c.minThreshold*2)-c.currentStock)*(c.pricePerUnit||0),0))}</td></tr></tfoot></table>
  `}
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" onclick="window.print()">🖨️ Imprimer</button>
  <button class="btn btn-primary" onclick="H.closeModal()">Fermer</button>
</div>`, true);
  },

  form(id=null) {
    const c = id ? DB.find('consumables',id)||{} : {};
    const cats = ['detergent','desinfectant','papier','emballage','epi','materiel','autre'];
    H.modal(`
<div class="modal-header"><h2 class="modal-title">${id?'Modifier':'Nouveau'} consommable</h2><button class="modal-close" onclick="H.closeModal()">×</button></div>
<div class="modal-body">
  <div class="form-group"><label>Nom <span class="required">*</span></label><input type="text" class="form-control" id="cf_name" value="${U.esc(c.name||'')}"></div>
  <div class="form-row-3">
    <div class="form-group"><label>Unité</label><input type="text" class="form-control" id="cf_unit" value="${U.esc(c.unit||'L')}"></div>
    <div class="form-group"><label>Stock actuel</label><input type="number" class="form-control" id="cf_stock" value="${c.currentStock||0}" step="0.1"></div>
    <div class="form-group"><label>Seuil min</label><input type="number" class="form-control" id="cf_min" value="${c.minThreshold||0}" step="0.1"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Catégorie</label>
      <select class="form-control" id="cf_cat">${cats.map(cat=>`<option value="${cat}" ${c.category===cat?'selected':''}>${cat}</option>`).join('')}</select></div>
    <div class="form-group"><label>Prix/unité (€)</label><input type="number" class="form-control" id="cf_price" value="${c.pricePerUnit||''}" step="0.01"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Fournisseur</label><input type="text" class="form-control" id="cf_sup" value="${U.esc(c.supplier||'')}"></div>
    <div class="form-group"><label>Référence</label><input type="text" class="form-control" id="cf_ref" value="${U.esc(c.supplierRef||'')}"></div>
  </div>
  <div class="form-group"><label>Notes</label><textarea class="form-control" id="cf_notes" rows="2">${U.esc(c.notes||'')}</textarea></div>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" onclick="H.closeModal()">Annuler</button>
  <button class="btn btn-primary" onclick="Stock.save('${id||''}')">💾 Enregistrer</button>
</div>`);
  },
  save(existId) {
    const name = document.getElementById('cf_name')?.value?.trim();
    if (!name) { Toast.err('Nom obligatoire'); return; }
    const c = {id:existId||U.uid(),name,unit:document.getElementById('cf_unit')?.value||'L',currentStock:parseFloat(document.getElementById('cf_stock')?.value)||0,minThreshold:parseFloat(document.getElementById('cf_min')?.value)||0,category:document.getElementById('cf_cat')?.value||'autre',pricePerUnit:parseFloat(document.getElementById('cf_price')?.value)||0,supplier:document.getElementById('cf_sup')?.value||'',supplierRef:document.getElementById('cf_ref')?.value||'',notes:document.getElementById('cf_notes')?.value||''};
    DB.save('consumables',c); H.closeModal(); Toast.ok(existId?'Modifié':'Ajouté'); App.render();
  },
  del(id) { H.confirm('Supprimer ce consommable ?',()=>{DB.del('consumables',id);Toast.ok('Supprimé');App.render();}); }
};

// ─── OBJECTIVES ────────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
const Objectives = {
  period: (() => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; })(),
  render() {
    const objs = DB.list('objectives').filter(o => o.period === this.period);
    const kp = BL.kpis(this.period+'-01', this.period+'-31');
    const autoVals = {ca:kp.revenue, completion_rate:kp.completionRate, quality:kp.avgQuality, missions_count:kp.total};
    return `
<div class="page-header">
  <div class="page-header-left"><h1>🎯 Objectifs & Performance</h1><div class="page-subtitle">Période : ${this.period}</div></div>
  <div class="page-header-actions">
    <input type="month" class="form-control" value="${this.period}" onchange="Objectives.period=this.value;App.render()" style="width:auto">
    <button class="btn btn-primary btn-sm" onclick="Objectives.form()">+ Objectif</button>
  </div>
</div>
<div class="kpi-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));margin-bottom:20px">
  <div class="kpi-card" style="--kpi-color:var(--brand)"><span class="kpi-icon">💶</span><div class="kpi-value" style="font-size:1.15rem">${U.cur(kp.revenue)}</div><div class="kpi-label">CA réalisé</div></div>
  <div class="kpi-card" style="--kpi-color:var(--success)"><span class="kpi-icon">✅</span><div class="kpi-value">${kp.completionRate}%</div><div class="kpi-label">Taux complétion</div></div>
  <div class="kpi-card" style="--kpi-color:var(--accent)"><span class="kpi-icon">⭐</span><div class="kpi-value">${kp.avgQuality??'—'}/10</div><div class="kpi-label">Score qualité</div></div>
  <div class="kpi-card" style="--kpi-color:var(--info)"><span class="kpi-icon">📋</span><div class="kpi-value">${kp.total}</div><div class="kpi-label">Missions</div></div>
</div>
<div class="card">
  <div class="card-header"><div class="card-title">Suivi des objectifs</div></div>
  ${objs.length === 0 ? H.empty('🎯','Aucun objectif défini','Créez vos objectifs pour cette période') :
    objs.map(obj => {
      const cur = autoVals[obj.type]!=null ? autoVals[obj.type] : (obj.current||0);
      const pct = obj.target > 0 ? U.clamp(Math.round(cur/obj.target*100),0,200) : 0;
      const color = pct >= 100 ? 'var(--success)' : pct >= 70 ? 'var(--warning)' : 'var(--danger)';
      return `<div style="background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px">
        <div class="flex items-center justify-between mb-2">
          <div><div class="font-bold text-sm">${U.esc(obj.label)}</div>
            <div class="text-xs text-muted">${cur}${obj.unit||''} réalisé / ${obj.target}${obj.unit||''} objectif</div></div>
          <div class="flex items-center gap-2">
            <span style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:800;color:${color}">${pct}%</span>
            <button class="btn btn-ghost btn-xs" onclick="Objectives.form('${obj.id}')">✏️</button>
            <button class="btn btn-ghost btn-xs" onclick="Objectives.del('${obj.id}')">🗑️</button>
          </div>
        </div>
        ${H.pct(Math.min(pct,100), 70, 30)}
      </div>`;
    }).join('')
  }
</div>`;
  },

  form(id=null) {
    const o = id ? DB.find('objectives',id)||{} : {};
    H.modal(`
<div class="modal-header"><h2 class="modal-title">${id?'Modifier':'Nouvel'} objectif</h2><button class="modal-close" onclick="H.closeModal()">×</button></div>
<div class="modal-body">
  <div class="form-group"><label>Libellé <span class="required">*</span></label><input type="text" class="form-control" id="of_label" value="${U.esc(o.label||'')}"></div>
  <div class="form-row">
    <div class="form-group"><label>Type KPI</label>
      <select class="form-control" id="of_type">
        <option value="ca" ${o.type==='ca'?'selected':''}>CA mensuel</option>
        <option value="completion_rate" ${o.type==='completion_rate'?'selected':''}>Taux complétion</option>
        <option value="quality" ${o.type==='quality'?'selected':''}>Score qualité</option>
        <option value="missions_count" ${o.type==='missions_count'?'selected':''}>Nb missions</option>
        <option value="custom" ${o.type==='custom'?'selected':''}>Personnalisé</option>
      </select></div>
    <div class="form-group"><label>Unité</label><input type="text" class="form-control" id="of_unit" value="${U.esc(o.unit||'')}"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Cible</label><input type="number" class="form-control" id="of_target" value="${o.target||''}" step="any"></div>
    <div class="form-group"><label>Valeur actuelle (si manuel)</label><input type="number" class="form-control" id="of_current" value="${o.current||0}" step="any"></div>
  </div>
  <div class="form-group"><label>Période</label><input type="month" class="form-control" id="of_period" value="${o.period||this.period}"></div>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" onclick="H.closeModal()">Annuler</button>
  <button class="btn btn-primary" onclick="Objectives.save('${id||''}')">💾 Enregistrer</button>
</div>`);
  },
  save(existId) {
    const label = document.getElementById('of_label')?.value?.trim();
    if (!label) { Toast.err('Libellé obligatoire'); return; }
    const o = {id:existId||U.uid(),label,type:document.getElementById('of_type')?.value||'custom',unit:document.getElementById('of_unit')?.value||'',target:parseFloat(document.getElementById('of_target')?.value)||0,current:parseFloat(document.getElementById('of_current')?.value)||0,period:document.getElementById('of_period')?.value||this.period};
    DB.save('objectives',o); H.closeModal(); Toast.ok('Objectif sauvegardé'); App.render();
  },
  del(id) { H.confirm('Supprimer cet objectif ?',()=>{DB.del('objectives',id);Toast.ok('Supprimé');App.render();}); }
};

// ─── SETTINGS ──────────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
const Settings = {
  tab: 'company',
  render() {
    const cfg = Config._d || Config.defaults();
    return `
<div class="page-header"><div class="page-header-left"><h1>⚙️ Paramètres</h1></div></div>
<div class="tabs">
  ${['company','business','types','zones'].map(t=>`<button class="tab-item${this.tab===t?' active':''}" onclick="Settings.tab='${t}';App.render()">${{company:'Entreprise',business:'Règles métier',types:'Types prestation',zones:'Zones'}[t]}</button>`).join('')}
</div>
${this.tab==='company'?this._company(cfg):this.tab==='business'?this._business(cfg):this.tab==='types'?this._types(cfg):this._zones(cfg)}`;
  },
  _company(cfg) {
    const c = cfg.company||{};
    return `<div class="card"><div class="card-header"><div class="card-title">Informations entreprise</div></div>
<div class="form-row"><div class="form-group"><label>Nom société</label><input type="text" class="form-control" id="sc_name" value="${U.esc(c.name||'')}"></div>
<div class="form-group"><label>Slogan</label><input type="text" class="form-control" id="sc_slogan" value="${U.esc(c.slogan||'')}"></div></div>
<div class="form-row"><div class="form-group"><label>Email</label><input type="email" class="form-control" id="sc_email" value="${U.esc(c.email||'')}"></div>
<div class="form-group"><label>Téléphone</label><input type="tel" class="form-control" id="sc_phone" value="${U.esc(c.phone||'')}"></div></div>
<div class="form-row"><div class="form-group"><label>Couleur principale</label><div class="flex gap-2 items-center"><input type="color" class="form-control" id="sc_primary" value="${c.primaryColor||'#1a6b4a'}" style="width:60px;height:38px;padding:2px"><input type="text" class="form-control" id="sc_primary_hex" value="${c.primaryColor||'#1a6b4a'}" oninput="document.getElementById('sc_primary').value=this.value"></div></div>
<div class="form-group"><label>Couleur secondaire</label><div class="flex gap-2 items-center"><input type="color" class="form-control" id="sc_secondary" value="${c.secondaryColor||'#f0a500'}" style="width:60px;height:38px;padding:2px"><input type="text" class="form-control" id="sc_secondary_hex" value="${c.secondaryColor||'#f0a500'}" oninput="document.getElementById('sc_secondary').value=this.value"></div></div></div>
<div class="mt-3"><button class="btn btn-primary" onclick="Settings.saveCompany()">💾 Enregistrer</button></div></div>`;
  },
  _business(cfg) {
    const b = cfg.business||{}, kp = cfg.kpiTargets||{};
    return `<div class="card"><div class="card-header"><div class="card-title">Règles métier & KPI</div></div>
<div class="form-row-3"><div class="form-group"><label>Vitesse m²/h défaut</label><input type="number" class="form-control" id="sb_speed" value="${b.defaultSpeedM2PerHour||150}"></div>
<div class="form-group"><label>Coût horaire défaut (€)</label><input type="number" class="form-control" id="sb_cost" value="${b.defaultHourlyCost||16.5}" step="0.5"></div>
<div class="form-group"><label>Marge cible (%)</label><input type="number" class="form-control" id="sb_margin" value="${b.defaultMarginPercent||35}"></div></div>
<div class="form-row"><div class="form-group"><label>Temps trajet défaut (min)</label><input type="number" class="form-control" id="sb_travel" value="${b.travelTimeMin||20}"></div>
<div class="form-group"><label>Max heures/jour</label><input type="number" class="form-control" id="sb_maxh" value="${b.maxHoursPerDay||10}"></div></div>
<div class="card-title mt-4 mb-3">Objectifs KPI par défaut</div>
<div class="form-row"><div class="form-group"><label>Taux complétion cible (%)</label><input type="number" class="form-control" id="sb_cr" value="${kp.completionRate||95}"></div>
<div class="form-group"><label>Score qualité min</label><input type="number" class="form-control" id="sb_q" value="${kp.qualityMin||8}" step="0.5"></div></div>
<div class="form-row"><div class="form-group"><label>CA mensuel cible (€)</label><input type="number" class="form-control" id="sb_ca" value="${kp.monthlyCA||25000}"></div>
<div class="form-group"><label>Ponctualité cible (%)</label><input type="number" class="form-control" id="sb_p" value="${kp.punctualityRate||90}"></div></div>
<div class="mt-3"><button class="btn btn-primary" onclick="Settings.saveBusiness()">💾 Enregistrer</button></div></div>`;
  },
  _types(cfg) {
    const types = cfg.prestationTypes||[];
    return `<div class="card"><div class="card-header"><div class="card-title">Types de prestation</div><button class="btn btn-primary btn-sm" onclick="Settings.addType()">+ Ajouter</button></div>
<div class="table-wrap"><table><thead><tr><th>Icône</th><th>Libellé</th><th>ID</th><th>Vitesse m²/h</th><th>Couleur</th><th>Actions</th></tr></thead><tbody>
${types.map(t=>`<tr><td>${t.icon}</td><td class="font-bold">${U.esc(t.label)}</td><td class="text-sm text-muted">${t.id}</td><td>${t.speedM2h||'—'}</td><td><span style="display:inline-block;width:20px;height:20px;background:${t.color};border-radius:4px"></span></td><td><button class="btn btn-ghost btn-xs" onclick="Settings.editType('${t.id}')">✏️</button></td></tr>`).join('')}
</tbody></table></div></div>`;
  },
  _zones(cfg) {
    const zones = cfg.zones||[];
    return `<div class="card"><div class="card-header"><div class="card-title">Zones géographiques</div><button class="btn btn-primary btn-sm" onclick="Settings.addZone()">+ Ajouter</button></div>
<div class="table-wrap"><table><thead><tr><th>ID</th><th>Libellé</th><th>Actions</th></tr></thead><tbody>
${zones.map(z=>`<tr><td class="text-muted text-sm">${z.id}</td><td class="font-bold">${U.esc(z.label)}</td><td><button class="btn btn-ghost btn-xs" onclick="Settings.editZone('${z.id}')">✏️</button><button class="btn btn-ghost btn-xs" onclick="Settings.delZone('${z.id}')">🗑️</button></td></tr>`).join('')}
</tbody></table></div></div>`;
  },
  saveCompany() {
    const cfg = Config._d;
    cfg.company.name = document.getElementById('sc_name')?.value||cfg.company.name;
    cfg.company.slogan = document.getElementById('sc_slogan')?.value||'';
    cfg.company.email = document.getElementById('sc_email')?.value||'';
    cfg.company.phone = document.getElementById('sc_phone')?.value||'';
    cfg.company.primaryColor = document.getElementById('sc_primary')?.value||cfg.company.primaryColor;
    cfg.company.secondaryColor = document.getElementById('sc_secondary')?.value||cfg.company.secondaryColor;
    Config.save(cfg); Toast.ok('Configuration sauvegardée'); App.render();
  },
  saveBusiness() {
    const cfg = Config._d;
    cfg.business.defaultSpeedM2PerHour = parseInt(document.getElementById('sb_speed')?.value)||150;
    cfg.business.defaultHourlyCost = parseFloat(document.getElementById('sb_cost')?.value)||16.5;
    cfg.business.defaultMarginPercent = parseFloat(document.getElementById('sb_margin')?.value)||35;
    cfg.business.travelTimeMin = parseInt(document.getElementById('sb_travel')?.value)||20;
    cfg.business.maxHoursPerDay = parseInt(document.getElementById('sb_maxh')?.value)||10;
    if (!cfg.kpiTargets) cfg.kpiTargets = {};
    cfg.kpiTargets.completionRate = parseInt(document.getElementById('sb_cr')?.value)||95;
    cfg.kpiTargets.qualityMin = parseFloat(document.getElementById('sb_q')?.value)||8;
    cfg.kpiTargets.monthlyCA = parseFloat(document.getElementById('sb_ca')?.value)||25000;
    cfg.kpiTargets.punctualityRate = parseInt(document.getElementById('sb_p')?.value)||90;
    Config.save(cfg); Toast.ok('Règles sauvegardées'); App.render();
  },
  addType() {
    H.modal(`<div class="modal-header"><h2 class="modal-title">Nouveau type</h2><button class="modal-close" onclick="H.closeModal()">×</button></div>
<div class="modal-body">
<div class="form-row"><div class="form-group"><label>ID (sans espace)</label><input type="text" class="form-control" id="tf_id" placeholder="ex: cuisine"></div>
<div class="form-group"><label>Icône emoji</label><input type="text" class="form-control" id="tf_icon" value="🧹" maxlength="4"></div></div>
<div class="form-row"><div class="form-group"><label>Libellé</label><input type="text" class="form-control" id="tf_label"></div>
<div class="form-group"><label>Vitesse m²/h</label><input type="number" class="form-control" id="tf_speed" value="150"></div></div>
<div class="form-group"><label>Couleur</label><input type="color" class="form-control" id="tf_color" value="#4CAF50" style="height:38px"></div>
</div><div class="modal-footer"><button class="btn btn-secondary" onclick="H.closeModal()">Annuler</button><button class="btn btn-primary" onclick="Settings.saveType()">Ajouter</button></div>`);
  },
  editType(id) {
    const t = (Config.get('prestationTypes')||[]).find(x=>x.id===id); if (!t) return;
    H.modal(`<div class="modal-header"><h2 class="modal-title">Modifier type</h2><button class="modal-close" onclick="H.closeModal()">×</button></div>
<div class="modal-body">
<div class="form-row"><div class="form-group"><label>ID</label><input type="text" class="form-control" id="tf_id" value="${t.id}" readonly style="opacity:.6"></div>
<div class="form-group"><label>Icône</label><input type="text" class="form-control" id="tf_icon" value="${t.icon}" maxlength="4"></div></div>
<div class="form-row"><div class="form-group"><label>Libellé</label><input type="text" class="form-control" id="tf_label" value="${U.esc(t.label)}"></div>
<div class="form-group"><label>Vitesse m²/h</label><input type="number" class="form-control" id="tf_speed" value="${t.speedM2h||150}"></div></div>
<div class="form-group"><label>Couleur</label><input type="color" class="form-control" id="tf_color" value="${t.color||'#4CAF50'}" style="height:38px"></div>
</div><div class="modal-footer"><button class="btn btn-secondary" onclick="H.closeModal()">Annuler</button><button class="btn btn-primary" onclick="Settings.saveType('${id}')">Enregistrer</button></div>`);
  },
  saveType(existId=null) {
    const id = existId || document.getElementById('tf_id')?.value?.trim().replace(/\s/g,'_');
    const label = document.getElementById('tf_label')?.value?.trim();
    if (!id||!label) { Toast.err('ID et libellé obligatoires'); return; }
    const cfg = Config._d;
    const obj = {id, label, icon:document.getElementById('tf_icon')?.value||'🧹', speedM2h:parseInt(document.getElementById('tf_speed')?.value)||150, color:document.getElementById('tf_color')?.value||'#4CAF50'};
    const idx = cfg.prestationTypes.findIndex(t=>t.id===id);
    if (idx>=0) cfg.prestationTypes[idx]=obj; else cfg.prestationTypes.push(obj);
    Config.save(cfg); H.closeModal(); Toast.ok('Sauvegardé'); App.render();
  },
  addZone() {
    H.modal(`<div class="modal-header"><h2 class="modal-title">Nouvelle zone</h2><button class="modal-close" onclick="H.closeModal()">×</button></div>
<div class="modal-body"><div class="form-row"><div class="form-group"><label>ID (ex: z6)</label><input type="text" class="form-control" id="zf_id"></div>
<div class="form-group"><label>Libellé</label><input type="text" class="form-control" id="zf_label"></div></div></div>
<div class="modal-footer"><button class="btn btn-secondary" onclick="H.closeModal()">Annuler</button><button class="btn btn-primary" onclick="Settings.saveZone()">Ajouter</button></div>`);
  },
  editZone(id) {
    const z = (Config.get('zones')||[]).find(x=>x.id===id); if (!z) return;
    H.modal(`<div class="modal-header"><h2 class="modal-title">Modifier zone</h2><button class="modal-close" onclick="H.closeModal()">×</button></div>
<div class="modal-body"><div class="form-row"><div class="form-group"><label>ID</label><input type="text" class="form-control" id="zf_id" value="${z.id}" readonly style="opacity:.6"></div>
<div class="form-group"><label>Libellé</label><input type="text" class="form-control" id="zf_label" value="${U.esc(z.label)}"></div></div></div>
<div class="modal-footer"><button class="btn btn-secondary" onclick="H.closeModal()">Annuler</button><button class="btn btn-primary" onclick="Settings.saveZone('${id}')">Enregistrer</button></div>`);
  },
  saveZone(existId=null) {
    const id = existId || document.getElementById('zf_id')?.value?.trim();
    const label = document.getElementById('zf_label')?.value?.trim();
    if (!id||!label) { Toast.err('ID et libellé obligatoires'); return; }
    const cfg = Config._d;
    const zone = {id, label};
    const idx = cfg.zones.findIndex(z=>z.id===id);
    if (idx>=0) cfg.zones[idx]=zone; else cfg.zones.push(zone);
    Config.save(cfg); H.closeModal(); Toast.ok('Zone sauvegardée'); App.render();
  },
  delZone(id) {
    H.confirm('Supprimer cette zone ?', () => {
      const cfg = Config._d; cfg.zones = cfg.zones.filter(z=>z.id!==id);
      Config.save(cfg); Toast.ok('Supprimée'); App.render();
    });
  }
};

// ═══════════════════════════════════════════════════════════════════════════
// ─── IMPORT / EXPORT ───────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
const IE = {
  render() {
    const counts = {
      employees: DB.list('employees').length,
      sites: DB.list('sites').length,
      missions: DB.list('missions').length,
      consumables: DB.list('consumables').length,
      objectives: DB.list('objectives').length
    };
    return `
<div class="page-header"><div class="page-header-left"><h1>🔄 Import / Export</h1><div class="page-subtitle">Sauvegarde et restauration des données</div></div></div>

<div class="grid-2">
  <div class="card">
    <div class="card-header"><div class="card-title">📤 Export</div></div>
    <div class="text-sm text-muted mb-3">Données actuelles: ${counts.employees} agents · ${counts.sites} sites · ${counts.missions} missions · ${counts.consumables} consommables</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary" onclick="IE.exportAll()">💾 Exporter tout (JSON)</button>
      <button class="btn btn-secondary" onclick="IE.exportEntity('missions','CSV')">↓ Missions CSV</button>
      <button class="btn btn-secondary" onclick="IE.exportEntity('employees','CSV')">↓ Agents CSV</button>
      <button class="btn btn-secondary" onclick="IE.exportEntity('sites','CSV')">↓ Sites CSV</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">📥 Import</div></div>
    <div class="text-sm text-muted mb-3">Importer un fichier JSON exporté depuis cette application</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="IE.importFile(this)">
      <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📂 Sélectionner fichier JSON</button>
      <button class="btn btn-secondary" onclick="IE.importFile(null,'merge')">📂 Import (fusion)</button>
    </div>
    <div id="import-feedback" class="mt-2"></div>
  </div>
</div>

<div class="card mt-4">
  <div class="card-header"><div class="card-title">🧪 Données de démonstration</div></div>
  <p class="text-sm text-muted mb-3">Chargez des données d'exemple pour explorer l'application (5 agents, 7 sites, 12 missions, 8 consommables)</p>
  <div class="flex gap-3">
    <button class="btn btn-primary" onclick="IE.loadDemo()">✨ Charger données démo</button>
    <button class="btn btn-danger" onclick="IE.resetAll()">⚠️ Effacer toutes les données</button>
  </div>
</div>`;
  },

  exportAll() {
    const data = {
      _meta: {version:'1.0', exported:U.now(), app:'OPS Nettoyage'},
      employees: DB.list('employees'),
      sites: DB.list('sites'),
      missions: DB.list('missions'),
      consumables: DB.list('consumables'),
      objectives: DB.list('objectives'),
      config: DB.get('config')
    };
    U.dlJSON(data, `ops_backup_${U.today()}.json`);
    Toast.ok('Backup téléchargé');
  },

  exportEntity(entity, fmt) {
    const data = DB.list(entity);
    if (!data.length) { Toast.warn('Aucune donnée à exporter'); return; }
    if (fmt === 'CSV') { U.dlCSV(data, `${entity}_${U.today()}.csv`); Toast.ok('Export CSV téléchargé'); }
    else { U.dlJSON(data, `${entity}_${U.today()}.json`); Toast.ok('Export JSON téléchargé'); }
  },

  importFile(input) {
    const file = input?.files?.[0];
    if (!file) { document.getElementById('import-file').click(); return; }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const keys = ['employees','sites','missions','consumables','objectives'];
        let count = 0;
        keys.forEach(k => { if (Array.isArray(data[k])) { DB.set(k, data[k]); count += data[k].length; } });
        if (data.config) { Config.save(data.config); }
        Toast.ok(`Import réussi: ${count} enregistrements`);
        App.render();
      } catch(err) { Toast.err('Fichier invalide: ' + err.message); }
    };
    reader.readAsText(file);
  },

  loadDemo() {
    H.confirm('Charger les données de démonstration ? (remplace les données existantes)', () => {
      ['employees','sites','missions','consumables','objectives'].forEach(k => {
        if (DEMO[k]) DB.set(k, DEMO[k]);
      });
      Toast.ok('Données démo chargées !');
      App.nav('dashboard');
    });
  },

  resetAll() {
    H.confirm('⚠️ Effacer TOUTES les données (irréversible) ?', () => {
      ['employees','sites','missions','consumables','objectives','config'].forEach(k => DB.clear(k));
      Config._d = null;
      Config.load().then(() => { Toast.ok('Données effacées'); App.nav('dashboard'); });
    });
  }
};

// ─── BOOT ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
